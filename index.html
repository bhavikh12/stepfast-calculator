<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepfast Flooring Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f0f4f8; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: #1e3a5f; color: white; padding: 20px; border-radius: 8px 8px 0 0; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .main { background: white; border-radius: 0 0 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
        .form-section { padding: 30px; border-right: 1px solid #e5e7eb; }
        .quote-section { padding: 30px; background: #f9fafb; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #374151; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
        select:focus, input:focus { outline: none; border-color: #1e3a5f; }
        .checkbox-group { display: flex; align-items: center; margin-bottom: 15px; }
        .checkbox-group input { width: auto; margin-right: 8px; }
        .nested { margin-left: 30px; margin-top: 10px; }
        .info-text { font-size: 12px; color: #1e3a5f; margin-top: 5px; }
        .btn { width: 100%; padding: 12px; background: #1e3a5f; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:hover { background: #2c4f7c; }
        .quote-card { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; }
        .quote-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f3f4f6; }
        .quote-row:last-child { border-bottom: none; }
        .quote-label { color: #6b7280; font-size: 14px; }
        .quote-value { font-weight: 600; color: #111827; font-size: 14px; }
        .section-title { font-weight: 700; font-size: 16px; margin: 20px 0 15px 0; color: #111827; }
        .total-row { padding: 15px 0; font-size: 18px; font-weight: 700; color: #1e3a5f; border-top: 2px solid #1e3a5f; margin-top: 10px; }
        .notice { background: #eff6ff; border-left: 3px solid #1e3a5f; padding: 10px; font-size: 12px; color: #1e40af; margin: 10px 0; }
        .placeholder { text-align: center; color: #9ca3af; padding: 40px 20px; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary { background: #10b981; }
        .btn-secondary:hover { background: #059669; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stepfast Flooring Quote Calculator</h1>
            <p>Professional flooring quotes • All prices exclude GST</p>
        </div>
        <div class="main">
            <div class="grid">
                <div class="form-section">
                    <div class="form-group">
                        <label>Installation Type</label>
                        <select id="installType">
                            <option value="FLOATING">Floating Flooring</option>
                            <option value="DIRECT">Direct Stick Flooring</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Product</label>
                        <select id="product"><option value="">Select Product</option></select>
                    </div>
                    
                    <div class="form-group hidden" id="thicknessGroup">
                        <label>Thickness</label>
                        <select id="thickness"><option value="">Select Thickness</option></select>
                    </div>
                    
                    <div class="form-group hidden" id="stripGroup">
                        <label>Strip Type</label>
                        <select id="stripType"><option value="">Select Strip Type</option></select>
                    </div>
                    
                    <div class="form-group hidden" id="timberGroup">
                        <label>Timber Type</label>
                        <select id="timberType"><option value="">Select Timber</option></select>
                    </div>
                    
                    <div class="form-group">
                        <label>Area (m²)</label>
                        <input type="number" id="area" placeholder="Enter area" step="0.1" min="0">
                        <div class="info-text hidden" id="wastageInfo"></div>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="removal">
                        <label for="removal" style="margin-bottom: 0;">Floor Removal Required</label>
                    </div>
                    
                    <div class="checkbox-group">
                        <input type="checkbox" id="skirting">
                        <label for="skirting" style="margin-bottom: 0;">Skirting Required</label>
                    </div>
                    
                    <div class="nested hidden" id="skirtingOptions">
                        <div class="form-group">
                            <label>Skirting Length (m)</label>
                            <input type="number" id="skirtingLength" placeholder="Enter length" step="0.1" min="0">
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="largeSkirting">
                            <label for="largeSkirting" style="margin-bottom: 0;">Large Skirting (110-140mm)</label>
                        </div>
                    </div>
                    
                    <div id="floatingServices" class="hidden">
                        <div class="checkbox-group">
                            <input type="checkbox" id="furniture">
                            <label for="furniture" style="margin-bottom: 0;">Light Furniture Moving ($500)</label>
                        </div>
                        <div class="nested hidden" id="extraTripOption">
                            <div class="checkbox-group">
                                <input type="checkbox" id="extraTrip">
                                <label for="extraTrip" style="margin-bottom: 0;">Additional Trip ($300 more)</label>
                            </div>
                        </div>
                    </div>
                    
                    <div id="directServices" class="hidden">
                        <div class="checkbox-group">
                            <input type="checkbox" id="dustProtect">
                            <label for="dustProtect" style="margin-bottom: 0;">Dust Protection, Clean, Furniture ($1,300)</label>
                        </div>
                    </div>
                    
                    <button class="btn" onclick="calculateQuote()">Calculate Quote</button>
                </div>
                
                <div class="quote-section">
                    <div id="quotePlaceholder" class="placeholder">
                        <p>Complete the form and click "Calculate Quote"</p>
                    </div>
                    
                    <div id="quoteResult" class="hidden">
                        <h2 style="margin-bottom: 20px;">Quote Summary</h2>
                        <div class="quote-card">
                            <div id="quoteDetails"></div>
                        </div>
                        <div class="button-group">
                            <button class="btn" onclick="alert('Quote saved!')">Save Quote</button>
                            <button class="btn btn-secondary" onclick="downloadQuote()">Download</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_DATA = `FLOATING FLOORING,Laminate,,8mm,1200 x 190mm,30,11,35,10
FLOATING FLOORING,Laminate,,12mm,1800 x 190mm,38,11,35,10
FLOATING FLOORING,Laminate,,14mm or Waterproof Surface,1800 x 190mm,85,11,35,10
FLOATING FLOORING,Hybrid,,6mm,1200 x 180mm,42,7,35,10
FLOATING FLOORING,Hybrid,,7mm,1500 x 180mm,50,7,35,10
FLOATING FLOORING,Hybrid,,9mm,1800 x 220mm,55,7,35,10
FLOATING FLOORING,Hybrid,,12mm,1800 x 220mm,70,7,35,10
FLOATING FLOORING,Engineered Timber,1 Strip,Bamboo,,85,7,40,10
FLOATING FLOORING,Engineered Timber,1 Strip,Blackbutt,,145,7,40,10
FLOATING FLOORING,Engineered Timber,1 Strip,Spotted Gum,,145,7,40,10
FLOATING FLOORING,Engineered Timber,1 Strip,Marri,,165,7,45,10
FLOATING FLOORING,Engineered Timber,1 Strip,Jarrah,,150,7,40,10
FLOATING FLOORING,Engineered Timber,1 Strip,Tasmanian Oak,,160,7,40,10
FLOATING FLOORING,Engineered Timber,1 Strip,European Oak,,130,7,40,10
FLOATING FLOORING,Engineered Timber,2 Strip,Blackbutt,,155,7,40,10
FLOATING FLOORING,Engineered Timber,2 Strip,Spotted Gum,,152,7,40,10
FLOATING FLOORING,Engineered Timber,2 Strip,Merbau,,140,7,40,10
FLOATING FLOORING,Engineered Timber,3 Strip,Blackbutt,,121,7,40,10
FLOATING FLOORING,Engineered Timber,3 Strip,Spotted Gum,,121,7,40,10
FLOATING FLOORING,Engineered Timber,3 Strip,Merbau,,125,7,40,10
DIRECT STICK FLOORING,Vinyl Planks,,2mm,1200 x 180,34,0,50,35
DIRECT STICK FLOORING,Vinyl Planks,,2.5mm,1200 x 180,45,0,50,35
DIRECT STICK FLOORING,Vinyl Planks,,4.5mm,1500 x 180,50,0,50,35
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Bamboo,,85,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Blackbutt,,145,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Spotted Gum,,145,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Marri,,165,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Jarrah,,150,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,Tasmanian Oak,,160,4,72,95
DIRECT STICK FLOORING,Engineered Timber,1 Strip,European Oak,,130,4,72,95
DIRECT STICK FLOORING,Engineered Timber,2 Strip,Blackbutt,,155,4,72,95
DIRECT STICK FLOORING,Engineered Timber,2 Strip,Spotted Gum,,152,4,72,95
DIRECT STICK FLOORING,Engineered Timber,2 Strip,Merbau,,140,4,72,95
DIRECT STICK FLOORING,Engineered Timber,3 Strip,Blackbutt,,121,4,72,95
DIRECT STICK FLOORING,Engineered Timber,3 Strip,Spotted Gum,,121,4,72,95
DIRECT STICK FLOORING,Engineered Timber,3 Strip,Merbau,,125,4,72,95`;

        const RATES = {
            MIN_INSTALL: 950,
            MIN_ACCESSORIES: 150,
            MIN_DIRECT_TIMBER_REMOVAL: 1200,
            SKIP_BIN: 500,
            SKIRTING_STD_MATERIAL: 5,
            SKIRTING_STD_LABOUR: 14,
            SKIRTING_STD_DELIVERY: 50,
            SKIRTING_LARGE_MATERIAL: 7,
            SKIRTING_LARGE_LABOUR: 20,
            SKIRTING_LARGE_DELIVERY: 70,
            FURNITURE_LIGHT: 500,
            FURNITURE_TWO_TRIPS: 800,
            DUST_PROTECT_MATERIAL: 1100,
            DUST_PROTECT_LABOUR: 200,
            WASTAGE: 1.05
        };

        let PRODUCTS = {};
        let currentQuote = null;

        function parseCSV() {
            PRODUCTS = { FLOATING: {}, DIRECT: {} };
            const lines = CSV_DATA.trim().split('\n').filter(l => l.trim());
            
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length < 9) return;
                
                const installType = parts[0].includes('FLOATING') ? 'FLOATING' : 'DIRECT';
                const product = parts[1].trim();
                const subType = parts[2].trim();
                const thicknessTimber = parts[3].trim();
                const size = parts[4].trim();
                const flooring = parseFloat(parts[5]) || 0;
                const accessories = parseFloat(parts[6]) || 0;
                const install = parseFloat(parts[7]) || 0;
                const remove = parseFloat(parts[8]) || 0;
                
                if (!PRODUCTS[installType][product]) {
                    if (product === 'Engineered Timber') {
                        PRODUCTS[installType][product] = {};
                    } else {
                        PRODUCTS[installType][product] = [];
                    }
                }
                
                if (product === 'Engineered Timber') {
                    if (!PRODUCTS[installType][product][subType]) {
                        PRODUCTS[installType][product][subType] = [];
                    }
                    PRODUCTS[installType][product][subType].push({
                        timber: thicknessTimber,
                        flooring, accessories, install, remove
                    });
                } else {
                    PRODUCTS[installType][product].push({
                        thickness: thicknessTimber,
                        size,
                        flooring, accessories, install, remove
                    });
                }
            });
        }

        parseCSV();

        document.getElementById('installType').addEventListener('change', function() {
            populateProducts();
            toggleServices();
        });

        document.getElementById('product').addEventListener('change', function() {
            const product = this.value;
            const installType = document.getElementById('installType').value;
            
            if (product === 'Engineered Timber') {
                show('stripGroup');
                hide('thicknessGroup');
                populateStripTypes(installType);
            } else if (product) {
                show('thicknessGroup');
                hide('stripGroup');
                hide('timberGroup');
                populateThickness(installType, product);
            } else {
                hide('thicknessGroup');
                hide('stripGroup');
                hide('timberGroup');
            }
        });

        document.getElementById('stripType').addEventListener('change', function() {
            if (this.value) {
                show('timberGroup');
                const installType = document.getElementById('installType').value;
                populateTimber(installType, this.value);
            } else {
                hide('timberGroup');
            }
        });

        document.getElementById('area').addEventListener('input', function() {
            const val = parseFloat(this.value);
            if (val > 0) {
                document.getElementById('wastageInfo').textContent = `Including 5% wastage: ${(val * 1.05).toFixed(2)} m²`;
                show('wastageInfo');
            } else {
                hide('wastageInfo');
            }
        });

        document.getElementById('skirting').addEventListener('change', function() {
            this.checked ? show('skirtingOptions') : hide('skirtingOptions');
        });

        document.getElementById('furniture').addEventListener('change', function() {
            if (this.checked) {
                show('extraTripOption');
            } else {
                hide('extraTripOption');
                document.getElementById('extraTrip').checked = false;
            }
        });

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        function populateProducts() {
            const installType = document.getElementById('installType').value;
            const select = document.getElementById('product');
            select.innerHTML = '<option value="">Select Product</option>';
            
            Object.keys(PRODUCTS[installType]).forEach(product => {
                select.innerHTML += `<option value="${product}">${product}</option>`;
            });
            
            hide('thicknessGroup');
            hide('stripGroup');
            hide('timberGroup');
        }

        function populateThickness(installType, product) {
            const select = document.getElementById('thickness');
            select.innerHTML = '<option value="">Select Thickness</option>';
            
            PRODUCTS[installType][product].forEach((item, idx) => {
                const label = item.size ? `${item.thickness} - ${item.size}` : item.thickness;
                select.innerHTML += `<option value="${idx}">${label}</option>`;
            });
        }

        function populateStripTypes(installType) {
            const select = document.getElementById('stripType');
            select.innerHTML = '<option value="">Select Strip Type</option>';
            
            Object.keys(PRODUCTS[installType]['Engineered Timber']).forEach(strip => {
                select.innerHTML += `<option value="${strip}">${strip}</option>`;
            });
            
            document.getElementById('timberType').innerHTML = '<option value="">Select Timber</option>';
        }

        function populateTimber(installType, stripType) {
            const select = document.getElementById('timberType');
            select.innerHTML = '<option value="">Select Timber</option>';
            
            PRODUCTS[installType]['Engineered Timber'][stripType].forEach((item, idx) => {
                select.innerHTML += `<option value="${idx}">${item.timber}</option>`;
            });
        }

        function toggleServices() {
            const installType = document.getElementById('installType').value;
            if (installType === 'FLOATING') {
                show('floatingServices');
                hide('directServices');
            } else {
                hide('floatingServices');
                show('directServices');
            }
        }

        function calculateQuote() {
            const installType = document.getElementById('installType').value;
            const product = document.getElementById('product').value;
            const area = parseFloat(document.getElementById('area').value);
            
            if (!product || !area) {
                alert('Please complete all required fields');
                return;
            }
            
            let selectedProduct;
            
            if (product === 'Engineered Timber') {
                const stripType = document.getElementById('stripType').value;
                const timberIdx = document.getElementById('timberType').value;
                
                if (!stripType || timberIdx === '') {
                    alert('Please select strip type and timber');
                    return;
                }
                
                selectedProduct = PRODUCTS[installType][product][stripType][parseInt(timberIdx)];
            } else {
                const thicknessIdx = document.getElementById('thickness').value;
                
                if (thicknessIdx === '') {
                    alert('Please select thickness');
                    return;
                }
                
                selectedProduct = PRODUCTS[installType][product][parseInt(thicknessIdx)];
            }
            
            const areaWithWastage = area * RATES.WASTAGE;
            
            let flooringCost = areaWithWastage * selectedProduct.flooring;
            let accessoriesCost = areaWithWastage * selectedProduct.accessories;
            
            if (area < 15) {
                accessoriesCost = Math.max(accessoriesCost, RATES.MIN_ACCESSORIES);
            }
            
            let installCost = areaWithWastage * selectedProduct.install;
            installCost = Math.max(installCost, RATES.MIN_INSTALL);
            
            let removalCost = 0;
            if (document.getElementById('removal').checked) {
                removalCost = areaWithWastage * selectedProduct.remove;
                if (installType === 'DIRECT' && product === 'Engineered Timber') {
                    removalCost = Math.max(removalCost, RATES.MIN_DIRECT_TIMBER_REMOVAL);
                }
            }
            
            let skipBinCost = 0;
            if (document.getElementById('removal').checked) {
                if (installType === 'FLOATING' && product === 'Engineered Timber' || installType === 'DIRECT') {
                    skipBinCost = RATES.SKIP_BIN;
                }
            }
            
            let skirtingMaterial = 0, skirtingLabour = 0, skirtingDelivery = 0;
            if (document.getElementById('skirting').checked) {
                const length = parseFloat(document.getElementById('skirtingLength').value) || 0;
                if (length > 0) {
                    const isLarge = document.getElementById('largeSkirting').checked;
                    skirtingMaterial = length * (isLarge ? RATES.SKIRTING_LARGE_MATERIAL : RATES.SKIRTING_STD_MATERIAL);
                    skirtingLabour = length * (isLarge ? RATES.SKIRTING_LARGE_LABOUR : RATES.SKIRTING_STD_LABOUR);
                    skirtingDelivery = isLarge ? RATES.SKIRTING_LARGE_DELIVERY : RATES.SKIRTING_STD_DELIVERY;
                }
            }
            
            let furnitureCost = 0;
            if (installType === 'FLOATING' && document.getElementById('furniture').checked) {
                furnitureCost = document.getElementById('extraTrip').checked ? RATES.FURNITURE_TWO_TRIPS : RATES.FURNITURE_LIGHT;
            }
            
            let dustProtectMaterial = 0, dustProtectLabour = 0;
            if (installType === 'DIRECT' && document.getElementById('dustProtect').checked) {
                dustProtectMaterial = RATES.DUST_PROTECT_MATERIAL;
                dustProtectLabour = RATES.DUST_PROTECT_LABOUR;
            }
            
            const subtotal = flooringCost + accessoriesCost + installCost + removalCost + skipBinCost + 
                           skirtingMaterial + skirtingLabour + skirtingDelivery + furnitureCost + 
                           dustProtectMaterial + dustProtectLabour;
            const gst = subtotal * 0.1;
            const total = subtotal + gst;
            
            currentQuote = {
                product, installType, area, areaWithWastage, selectedProduct,
                flooringCost, accessoriesCost, installCost, removalCost, skipBinCost,
                skirtingMaterial, skirtingLabour, skirtingDelivery,
                furnitureCost, dustProtectMaterial, dustProtectLabour,
                subtotal, gst, total
            };
            
            displayQuote();
        }

        function displayQuote() {
            const q = currentQuote;
            const product = document.getElementById('product').value;
            
            let productDetails = product;
            if (product === 'Engineered Timber') {
                const strip = document.getElementById('stripType').value;
                const timber = document.getElementById('timberType').options[document.getElementById('timberType').selectedIndex].text;
                productDetails += ` (${strip}, ${timber})`;
            } else {
                const thickness = document.getElementById('thickness').options[document.getElementById('thickness').selectedIndex].text;
                productDetails += ` (${thickness})`;
            }
            
            let html = `
                <div class="quote-row"><span class="quote-label">Product:</span><span class="quote-value">${productDetails}</span></div>
                <div class="quote-row"><span class="quote-label">Area with Wastage:</span><span class="quote-value">${q.areaWithWastage.toFixed(2)} m²</span></div>
                <div class="section-title">Flooring Details</div>
                <div class="quote-row"><span class="quote-label">Flooring:</span><span class="quote-value">$${q.flooringCost.toFixed(2)}</span></div>
                <div class="quote-row"><span class="quote-label">Accessories:</span><span class="quote-value">$${q.accessoriesCost.toFixed(2)}</span></div>
            `;
            
            if (q.area < 15 && q.accessoriesCost >= RATES.MIN_ACCESSORIES) {
                html += `<div class="notice">*Minimum accessories charge of $150 applied</div>`;
            }
            
            html += `<div class="quote-row"><span class="quote-label">Installation:</span><span class="quote-value">$${q.installCost.toFixed(2)}</span></div>`;
            
            if (q.installCost === RATES.MIN_INSTALL) {
                html += `<div class="notice">*Minimum installation charge of $950 applied</div>`;
            }
            
            if (q.removalCost > 0) {
                html += `<div class="quote-row"><span class="quote-label">Floor Removal:</span><span class="quote-value">$${q.removalCost.toFixed(2)}</span></div>`;
                if (q.installType === 'DIRECT' && product === 'Engineered Timber' && q.removalCost === RATES.MIN_DIRECT_TIMBER_REMOVAL) {
                    html += `<div class="notice">*Minimum removal charge of $1,200 applied</div>`;
                }
            }
            
            if (q.skipBinCost > 0) {
                html += `<div class="quote-row"><span class="quote-label">Skip Bin:</span><span class="quote-value">$${q.skipBinCost.toFixed(2)}</span></div>`;
            }
            
            if (q.skirtingMaterial + q.skirtingLabour + q.skirtingDelivery > 0) {
                html += `
                    <div class="section-title">Skirtings</div>
                    <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.skirtingMaterial.toFixed(2)}</span></div>
                    <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.skirtingLabour.toFixed(2)}</span></div>
                    <div class="quote-row"><span class="quote-label">Delivery:</span><span class="quote-value">$${q.skirtingDelivery.toFixed(2)}</span></div>
                `;
            }
            
            if (q.furnitureCost > 0) {
                html += `<div class="section-title">Furniture Moving</div><div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.furnitureCost.toFixed(2)}</span></div>`;
            }
            
            if (q.dustProtectMaterial + q.dustProtectLabour > 0) {
                html += `
                    <div class="section-title">Dust Protection</div>
                    <div class="quote-row"><span class="quote-label">Materials:</span><span class="quote-value">$${q.dustProtectMaterial.toFixed(2)}</span></div>
                    <div class="quote-row"><span class="quote-label">Labour:</span><span class="quote-value">$${q.dustProtectLabour.toFixed(2)}</span></div>
                `;
            }
            
            html += `
                <div class="quote-row total-row"><span>Subtotal:</span><span>$${q.subtotal.toFixed(2)}</span></div>
                <div class="quote-row"><span class="quote-label">GST (10%):</span><span class="quote-value">$${q.gst.toFixed(2)}</span></div>
                <div class="quote-row total-row"><span>Total (inc. GST):</span><span>$${q.total.toFixed(2)}</span></div>
            `;
            
            document.getElementById('quoteDetails').innerHTML = html;
            hide('quotePlaceholder');
            show('quoteResult');
        }

        function downloadQuote() {
            if (!currentQuote) return;
            const q = currentQuote;
            const product = document.getElementById('product').value;
            
            let productDetails = product;
            if (product === 'Engineered Timber') {
                const strip = document.getElementById('stripType').value;
                const timber = document.getElementById('timberType').options[document.getElementById('timberType').selectedIndex].text;
                productDetails += ` (${strip}, ${timber})`;
            } else {
                const thickness = document.getElementById('thickness').options[document.getElementById('thickness').selectedIndex].text;
                productDetails += ` (${thickness})`;
            }
            
            let text = `STEPFAST FLOORING - QUOTE\n============================\n\n`;
            text += `Date: ${new Date().toLocaleDateString()}\n`;
            text += `Product: ${productDetails}\n`;
            text += `Area: ${q.area} m² (${q.areaWithWastage.toFixed(2)} m² with wastage)\n\n`;
            text += `Flooring: $${q.flooringCost.toFixed(2)}\n`;
            text += `Accessories: $${q.accessoriesCost.toFixed(2)}\n`;
            text += `Installation: $${q.installCost.toFixed(2)}\n`;
            if (q.removalCost > 0) text += `Floor Removal: $${q.removalCost.toFixed(2)}\n`;
            if (q.skipBinCost > 0) text += `Skip Bin: $${q.skipBinCost.toFixed(2)}\n`;
            if (q.skirtingMaterial + q.skirtingLabour + q.skirtingDelivery > 0) {
                text += `Skirtings: $${(q.skirtingMaterial + q.skirtingLabour + q.skirtingDelivery).toFixed(2)}\n`;
            }
            if (q.furnitureCost > 0) text += `Furniture Moving: $${q.furnitureCost.toFixed(2)}\n`;
            if (q.dustProtectMaterial + q.dustProtectLabour > 0) {
                text += `Dust Protection: $${(q.dustProtectMaterial + q.dustProtectLabour).toFixed(2)}\n`;
            }
            text += `\nSubtotal: $${q.subtotal.toFixed(2)}\n`;
            text += `GST (10%): $${q.gst.toFixed(2)}\n`;
            text += `TOTAL: $${q.total.toFixed(2)}\n\n`;
            text += `Stepfast Flooring | (08) 9303 4575`;
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Stepfast_Quote_${new Date().toISOString().split('T')[0]}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        populateProducts();
        toggleServices();
    </script>
</body>
</html>
